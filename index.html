<style>
  :root{
    --bg:#F7F5F0;
    --ink:#132A26;
    --teal:#0F5C56;
    --teal-dark:#0A403C;
    --coral:#E15A3D;
    --sand:#EFE6D6;
    --sage:#7FA292;
    --line:#DDD3BF;
    --white:#FFFDFA;
    --danger:#C0392B;
    --gold:#C08B2E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--coral);color:#fff;}

  /* ---------- layout shell ---------- */
  #root{min-height:100vh;}
  .app-shell{display:flex;min-height:100vh;}
  .sidebar{
    width:250px;flex-shrink:0;background:var(--teal-dark);color:var(--white);
    display:flex;flex-direction:column;padding:24px 18px;
  }
  .sidebar .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 6px;}
  .sidebar .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--coral);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:#fff;flex-shrink:0;}
  .sidebar .brand .name{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.1;}
  .sidebar .brand .sub{font-size:10.5px;opacity:.6;letter-spacing:.04em;text-transform:uppercase;margin-top:2px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:2px;
    background:transparent;border:none;color:rgba(255,255,255,.72);font-size:14.5px;font-weight:500;text-align:left;width:100%;
    transition:background .15s;
  }
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
  .nav-item.active{background:var(--coral);color:#fff;}
  .nav-item .ico{width:18px;text-align:center;flex-shrink:0;}
  .nav-badge{background:var(--coral);color:#fff;font-size:10.5px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:auto;}
  .nav-spacer{flex:1;}
  .nav-divider{height:1px;background:rgba(255,255,255,.12);margin:8px 4px 8px;}
  .user-card{border-top:1px solid rgba(255,255,255,.14);padding-top:14px;margin-top:10px;}
  .user-card .u-name{font-size:13.5px;font-weight:600;}
  .user-card .u-role{font-size:11.5px;opacity:.65;margin-top:1px;}

  .main{flex:1;min-width:0;padding:34px 40px 60px;max-width:1080px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:10px;}
  .topbar h1{font-size:26px;margin:0;font-weight:600;}
  .topbar p{margin:4px 0 0;color:#5b6a65;font-size:14px;}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:8px;font-weight:600;font-size:14px;border:none;}
  .btn-primary{background:var(--coral);color:#fff;}
  .btn-primary:hover{background:#c94a30;}
  .btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink);}
  .btn-ghost:hover{border-color:var(--teal);}
  .btn-dark{background:var(--teal-dark);color:#fff;}
  .btn-dark:hover{background:var(--teal);}
  .btn-danger{background:transparent;border:1.5px solid var(--danger);color:var(--danger);}
  .btn-danger:hover{background:var(--danger);color:#fff;}
  .btn-sm{padding:7px 13px;font-size:12.5px;border-radius:7px;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  .card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:22px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:#5b6a65;margin-bottom:6px;}
  .field input,.field select,.field textarea{
    width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:8px;font-size:14.5px;font-family:inherit;
    background:#fff;color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);}
  .field .hint{font-size:12px;color:#8a938e;margin-top:5px;}
  .field textarea{resize:vertical;min-height:80px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:640px){.grid2{grid-template-columns:1fr;}}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600;letter-spacing:.02em;}
  .pill-open{background:#FCEFE9;color:var(--coral);}
  .pill-resolved{background:#E7F1EA;color:#2E7D4F;}
  .pill-low{background:#EEF3F1;color:#5b6a65;}
  .pill-medium{background:#FBF1DD;color:var(--gold);}
  .pill-high{background:#FBE7E3;color:var(--danger);}
  .pill-health_emergency{background:var(--danger);color:#fff;}

  .ticket-row{display:flex;align-items:center;gap:16px;padding:16px 18px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
  .ticket-row:hover{border-color:var(--teal);}
  .ticket-row .t-id{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8a938e;width:78px;flex-shrink:0;}
  .ticket-row .t-main{flex:1;min-width:0;}
  .ticket-row .t-title{font-weight:600;font-size:14.5px;margin-bottom:3px;}
  .ticket-row .t-sub{font-size:12.5px;color:#7c867f;}

  /* escalation ladder — signature element */
  .ladder{display:flex;align-items:center;gap:0;margin:18px 0 22px;position:relative;}
  .ladder .rung{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
  .ladder .dot{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#a5ada7;z-index:1;}
  .ladder .rung.done .dot{border-color:var(--sage);background:var(--sage);color:#fff;}
  .ladder .rung.current .dot{border-color:var(--coral);background:var(--coral);color:#fff;box-shadow:0 0 0 4px #FCEFE9;}
  .ladder .rung.resolved .dot{border-color:#2E7D4F;background:#2E7D4F;color:#fff;}
  .ladder .label{font-size:10.5px;text-align:center;margin-top:7px;color:#7c867f;font-weight:600;text-transform:uppercase;letter-spacing:.02em;max-width:90px;}
  .ladder .rung.done .label,.ladder .rung.current .label,.ladder .rung.resolved .label{color:var(--ink);}
  .ladder .track-bg,.ladder .track-fg{position:absolute;top:14px;height:2.5px;background:var(--line);z-index:0;}
  .ladder .track-fg{background:var(--sage);}

  .timeline-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #F0EBE0;}
  .timeline-item:last-child{border-bottom:none;}
  .timeline-item .t-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);margin-top:6px;flex-shrink:0;}
  .timeline-item .t-body{flex:1;}
  .timeline-item .t-head{font-size:13px;font-weight:600;}
  .timeline-item .t-note{font-size:13.5px;color:#4a5551;margin-top:3px;}
  .timeline-item .t-time{font-size:11px;color:#a5ada7;margin-top:3px;font-family:'JetBrains Mono',monospace;}

  .banner{background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:12px 16px;font-size:13px;color:#5b4a2f;margin-bottom:20px;line-height:1.5;}
  .banner b{color:var(--ink);}
  .empty{text-align:center;padding:50px 20px;color:#8a938e;}
  .empty .big{font-size:34px;margin-bottom:8px;}

  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:
    radial-gradient(circle at 15% 20%, #16463F 0%, transparent 45%), var(--teal-dark);}
  .auth-card{width:100%;max-width:440px;background:var(--white);border-radius:18px;padding:34px 32px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4);}
  .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .auth-logo .mark{width:36px;height:36px;border-radius:10px;background:var(--coral);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:19px;color:#fff;}
  .auth-logo .name{font-family:'Fraunces',serif;font-size:21px;font-weight:600;}
  .auth-tag{color:#7c867f;font-size:13.5px;margin:0 0 22px;}
  .tabs{display:flex;gap:4px;background:var(--sand);padding:4px;border-radius:9px;margin-bottom:22px;}
  .tab{flex:1;text-align:center;padding:8px;border-radius:6px;border:none;background:transparent;font-size:13.5px;font-weight:600;color:#7c867f;}
  .tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .err{color:var(--danger);font-size:13px;margin:4px 0 12px;}

  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px;}
  @media (max-width:640px){.stat-row{grid-template-columns:1fr;}}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
  .stat .n{font-family:'Fraunces',serif;font-size:30px;font-weight:600;line-height:1;}
  .stat .l{font-size:12px;color:#7c867f;margin-top:6px;text-transform:uppercase;letter-spacing:.03em;font-weight:600;}

  .contact-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:12px;padding:14px;background:var(--bg);border-radius:10px;border:1px solid var(--line);}
  .contact-row .field{margin-bottom:0;flex:1;}
  .type-toggle{display:flex;gap:10px;margin-bottom:18px;}
  .type-toggle button{flex:1;padding:14px;border-radius:10px;border:2px solid var(--line);background:#fff;font-weight:600;font-size:14px;color:#7c867f;text-align:left;}
  .type-toggle button .tt-desc{display:block;font-weight:400;font-size:12px;margin-top:2px;color:#a5ada7;}
  .type-toggle button.sel{border-color:var(--coral);background:#FCEFE9;color:var(--coral);}
  .type-toggle button.sel .tt-desc{color:#c9765f;}

  .urgency-toggle{display:flex;gap:8px;}
  .urgency-toggle button{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:#7c867f;}
  .urgency-toggle button.sel-low{border-color:#7c867f;background:#EEF3F1;color:#5b6a65;}
  .urgency-toggle button.sel-medium{border-color:var(--gold);background:#FBF1DD;color:var(--gold);}
  .urgency-toggle button.sel-high{border-color:var(--danger);background:#FBE7E3;color:var(--danger);}
  .urgency-toggle button.sel-health_emergency{border-color:var(--danger);background:var(--danger);color:#fff;}

  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#7c867f;font-weight:600;margin-bottom:16px;background:none;border:none;}
  .back-link:hover{color:var(--teal);}

  .divider{height:1px;background:var(--line);margin:22px 0;}
  .sos-card{background:linear-gradient(135deg,var(--coral),#c94a30);color:#fff;border-radius:14px;padding:20px 22px;margin-bottom:24px;}
  .sos-card h3{margin:0 0 4px;font-size:17px;}
  .sos-card p{margin:0;font-size:13px;opacity:.9;}
  .sos-card .sos-numbers{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;}
  .sos-card .sos-numbers div{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;}
  .sos-card .sos-numbers span{display:block;font-family:'Inter';font-weight:400;font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.03em;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--teal-dark);color:#fff;padding:13px 20px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:999;animation:toastin .2s ease;}
  @keyframes toastin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .sla-pulse{animation:slapulse 1.6s ease-in-out infinite;}
  @keyframes slapulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.35);}50%{box-shadow:0 0 0 5px rgba(192,57,43,0);}}

  select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%237c867f'><path d='M5.5 7.5l4.5 4.5 4.5-4.5' stroke='%237c867f' stroke-width='1.5' fill='none'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px;}

  .mobile-topbar{display:none;}
  @media (max-width:860px){
    .app-shell{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;align-items:center;padding:10px 12px;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .sidebar .brand{margin-bottom:0;padding-right:6px;border-right:1px solid rgba(255,255,255,.15);}
    .sidebar .brand .sub{display:none;}
    .sidebar .nav-item{white-space:nowrap;width:auto;flex-shrink:0;padding:9px 12px;font-size:13.5px;}
    .nav-spacer{display:none;}
    .nav-divider{display:none;}
    .user-card{display:none;}
    .main{padding:18px 16px 60px;}
    .topbar h1{font-size:21px;}
    .stat-row{grid-template-columns:1fr 1fr;}
    .ticket-row{flex-wrap:wrap;}
    .ticket-row .t-id{width:auto;}
    .ladder .label{font-size:9px;max-width:64px;}
  }
  @media (max-width:480px){
    .stat-row{grid-template-columns:1fr;}
    .auth-card{padding:26px 20px;}
    .type-toggle{flex-direction:column;}
    .urgency-toggle{flex-direction:column;}
    .contact-row{flex-direction:column;align-items:stretch;}
  }
</style>
</head>

  view: "report",

/* ---------------- small helpers ---------------- */
function nowIso(){ return new Date().toISOString(); }
function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-ZA',{day:'2-digit',month:'short'}) + " · " + d.toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});
}
function escapeHtml(s){
  if(!s) return "";
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function shortId(id){ return "SMU-" + id.slice(0,6).toUpperCase(); }
function showToast(msg){

  setTimeout(()=>{ state.toast=null; render(); }, 2600);

function selectWithOther(fieldName, options, label, selectedVal, hint){
  const isOther = selectedVal && !options.includes(selectedVal);
  return `
  <div class="field">
    <label>${label}</label>
    <select name="${fieldName}" data-other-toggle="${fieldName}">
      <option value="">Select...</option>
      ${options.map(o=>`<option value="${escapeHtml(o)}" ${(isOther? o===OTHER_VAL : o===selectedVal)?'selected':''}>${escapeHtml(o)}</option>`).join("")}
    </select>
    <input type="text" name="${fieldName}Other" data-other-input="${fieldName}"
      style="margin-top:8px;display:${isOther?'block':'none'};"
      placeholder="Type it here" value="${escapeHtml(isOther?selectedVal:'')}" />
    ${hint ? `<div class="hint">${hint}</div>` : ``}
  </div>`;
}
function resolveOtherField(form, fieldName){
  const sel = form[fieldName];
  if(!sel) return "";
  return sel.value === OTHER_VAL ? (form[fieldName+"Other"].value.trim()) : sel.value;
}
function bindOtherToggles(){
  document.querySelectorAll('[data-other-toggle]').forEach(sel=>{
    sel.onchange = ()=>{
      const inp = document.querySelector('[data-other-input="'+sel.dataset.otherToggle+'"]');
      if(inp) inp.style.display = sel.value===OTHER_VAL ? 'block' : 'none';
    };
  });
}

/* ---------------- routing ----------------
   Wrapped defensively: some artifact/iframe sandboxes block the History
   API, and a thrown SecurityError here must never stop render() from
   running — that would freeze the whole app right after login. */
let suppressHashHandler = false;
function setView(view, ticketId){
  state.view = view;
  state.currentTicketId = ticketId || null;
  try{
    const newHash = "#" + view + (ticketId ? "/" + ticketId : "");
    if(location.hash !== newHash){
      suppressHashHandler = true;
      location.hash = newHash;
    }
  }catch(e){ /* ignore */ }
  render();
}
try{
  window.addEventListener("hashchange", ()=>{
    if(suppressHashHandler){ suppressHashHandler = false; return; }
    if(!state.user) return;
    const raw = location.hash.replace(/^#/, "");
    if(!raw) return;
    const [view, param] = raw.split("/");
    if(view === "ticket" && param) openTicket(param);
    else setView(view);
  });
}catch(e){ /* ignore */ }

/* ---------------- auth ---------------- */
function validEmail(email){
  const e = email.trim().toLowerCase();
  // SMU addresses always pass here. Anything else that's still a well-formed
  // email is allowed to attempt signup too — the database is the real
  // authority (enforce_smu_email trigger), and will reject it with a clear
  // message unless an admin has pre-approved it as an external partner.
  return /^[0-9]{9}@swave\.smu\.ac\.za$/.test(e) || /^[^@]+@smu\.ac\.za$/.test(e) || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

async function handleSignup(form){
  const email = form.email.value.trim().toLowerCase();
  const password = form.password.value;
  const name = form.name.value.trim();
  const phone = form.phone.value.trim();
  const roomNumber = form.roomNumber ? form.roomNumber.value.trim() : "";
  const residence = resolveOtherField(form, 'residence');

  // Preserve everything the person already typed right away — if validation
  // fails below, render() redraws this whole form, and only fields wired to
  // this draft survive that. (Password is deliberately left out — normal
  // practice is to make them retype it, not persist it in state.)
  state.signupDraft = { name, email, phone, roomNumber, residence };

  if(!validEmail(email)){
    state.authError = "Use your official SMU email — nine digits + @swave.smu.ac.za for students (e.g. 202312345@swave.smu.ac.za), or your staff @smu.ac.za address.";
    render(); return;
  }
  if(!name){ state.authError = "Please enter your full name."; render(); return; }
  if(!password || password.length < 8){
    state.authError = "Please choose a password with at least 8 characters.";
    render(); return;
  }

  const { data, error } = await sb.auth.signUp({ email, password });
  if(error){ state.authError = error.message; render(); return; }
  if(!data.session){
    state.authError = "Account created, but no active session came back — this usually means \"Confirm email\" is still ON in Supabase Auth settings. Turn it off for testing (Authentication → Providers → Email) and try again.";
    render(); return;
  }

  const { error: profErr } = await sb.from('profiles').insert({
    id: data.user.id, email, name, phone, room_number: roomNumber, residence: residence || ""
  });
  if(profErr){
    state.authError = "Account created but profile setup failed: " + profErr.message;
    render(); return;
  }

  await sb.auth.signOut();
  state.authError = "";
  state.authSuccess = "Account created! Sign in below to continue.";
  state.authMode = "signin";
  state.lastSignupEmail = email;
  state.signupDraft = {};
  render();
}

async function handleSignin(form){
  const email = form.email.value.trim().toLowerCase();
  const password = form.password.value;
  if(!validEmail(email)){
    state.authError = "Please enter a valid SMU email address.";
    render(); return;
  }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ state.authError = error.message; render(); return; }
  state.authError = "";
  await loadUserAndGo();
}

async function handleSignout(){
  await sb.auth.signOut();
  state.user = null;
  state.healthInfo = null;
  state.contacts = [];
  state.tickets = [];
  state.currentTicketId = null;
  suppressHashHandler = true;
  try{ history.replaceState(null, "", location.pathname + location.search); }catch(e){}
  render();
}

async function loadUserAndGo(){
  const { data: { user } } = await sb.auth.getUser();
  if(!user){ render(); return; }
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
  if(error || !profile){
    state.authError = "Couldn't load your profile. Please try signing in again.";
    render(); return;
  }
  state.user = profile;
  try{ await sb.rpc('run_sla_escalations'); }catch(e){ /* fine if not permitted yet */ }
  const loaders = [loadTickets(), loadHealth(), loadLeaders(), loadNotifications()];
  if(profile.is_admin || profile.role === "residence_manager") loaders.push(loadAnalytics());
  if(profile.is_admin) loaders.push(loadApprovedPartners());
  await Promise.all(loaders);
  setView(profile.role==="student" ? "report" : profile.role==="vendor" ? "vendor-tickets" : "queue");
  subscribeRealtime();
}

let realtimeChannel = null;
function subscribeRealtime(){
  if(realtimeChannel) return;
  try{
    realtimeChannel = sb.channel('tickets-live')
      .on('postgres_changes', {event:'*', schema:'public', table:'tickets'}, async ()=>{
        await loadTickets();
        if(state.view === "ticket" && state.currentTicketId) await loadTicketEvents(state.currentTicketId);
        render();
      })
      .on('postgres_changes', {event:'*', schema:'public', table:'ticket_events'}, async ()=>{
        if(state.user.is_admin || state.user.role === "residence_manager") await loadAnalytics();
        if(state.view === "ticket" && state.currentTicketId) await loadTicketEvents(state.currentTicketId);
        render();
      })
      .subscribe();
  }catch(e){ /* realtime optional — ignore if unavailable */ }
}

/* ---------------- ticket logic ---------------- */
async function createTicket(data){
  const chain = CHAINS[data.type];
  const { data: ticket, error } = await sb.from('tickets').insert({
    type: data.type, category: data.category, residence: data.residence || "",
    location: data.location, description: data.description, urgency: data.urgency,
    student_id: state.user.id, student_name: state.user.name, chain, source: "web"
  }).select().single();
  if(error){ showToast("Could not submit report: " + error.message); return; }
  await sb.from('ticket_events').insert({
    ticket_id: ticket.id, stage: "student", action: "reported", note: data.description,
    by_name: state.user.name, by_role: "student"
  });
  await loadTickets();
  setView("ticket", ticket.id);
  showToast("Issue reported. It's now with " + STAGE_LABELS[chain[1]] + ".");
}

async function escalateTicket(ticket, note){
  const nextIdx = ticket.stage_index + 1;
  if(nextIdx > ticket.chain.length) return;
  await sb.from('tickets').update({ stage_index: nextIdx, status: "open", sla_clock_start: nowIso() }).eq('id', ticket.id);
  await sb.from('ticket_events').insert({
    ticket_id: ticket.id, stage: ticket.chain[nextIdx-1], action: "escalated", note: note || "",
    by_name: state.user.name, by_role: state.user.role
  });
  await Promise.all([loadTickets(), loadTicketEvents(ticket.id)]);
  showToast("Escalated to " + STAGE_LABELS[ticket.chain[nextIdx-1]] + ".");
}

async function resolveTicket(ticket, note){
  await sb.from('tickets').update({ status: "resolved", resolved_at: nowIso() }).eq('id', ticket.id);
  await sb.from('ticket_events').insert({
    ticket_id: ticket.id, stage: ticket.chain[ticket.stage_index-1], action: "resolved", note: note || "",
    by_name: state.user.name, by_role: state.user.role
  });
  await Promise.all([loadTickets(), loadTicketEvents(ticket.id)]);
  showToast("Marked as resolved.");
}

async function forwardToVendor(ticket, vendor){
  if(!vendor) return;
  const now = nowIso();
  const { error } = await sb.from('tickets').update({ vendor_forwarded_at: now }).eq('id', ticket.id);
  if(error){ showToast("Could not forward: " + error.message); return; }
  await sb.from('ticket_events').insert({
    ticket_id: ticket.id, stage: ticket.chain[ticket.stage_index-1], action: "vendor_forwarded",
    note: `Forwarded to ${vendor.vendor_company || vendor.name} for troubleshooting.`,
    by_name: state.user.name, by_role: state.user.role
  });
  await Promise.all([loadTickets(), loadTicketEvents(ticket.id)]);
  showToast("Forwarded to " + (vendor.vendor_company||vendor.name) + ".");
}

async function reopenTicket(ticket, note){
  await sb.from('tickets').update({ status: "open", sla_clock_start: nowIso(), resolved_at: null }).eq('id', ticket.id);
  await sb.from('ticket_events').insert({
    ticket_id: ticket.id, stage: ticket.chain[ticket.stage_index-1], action: "reopened", note: note || "",
    by_name: state.user.name, by_role: state.user.role
  });
  await Promise.all([loadTickets(), loadTicketEvents(ticket.id)]);
  showToast("Issue reopened.");
}

async function commentTicket(ticket, note, isHandlerAction){
  if(!note.trim()) return;
  if(isHandlerAction){
    await sb.from('tickets').update({ sla_clock_start: nowIso() }).eq('id', ticket.id);
  }
  await sb.from('ticket_events').insert({
    ticket_id: ticket.id, stage: ticket.chain[ticket.stage_index-1], action: "comment", note,
    by_name: state.user.name, by_role: state.user.role
  });
  await Promise.all([loadTickets(), loadTicketEvents(ticket.id)]);
}

function canActOnTicket(t, user){
  if(t.status === "resolved") return false;
  const currentStageRole = t.chain[t.stage_index-1];
  if(currentStageRole !== user.role) return false;
  if(user.role === "house_committee" || user.role === "residence_manager"){
    if(t.type !== "residence") return false;
    return !!(t.residence && user.residence &&
      t.residence.trim().toLowerCase() === user.residence.trim().toLowerCase());
  }
  return true; // src
}
function myReports(){
  return state.tickets.filter(t => t.student_id === state.user.id)
    .sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
}
function myQueueTickets(){
  return state.tickets.filter(t => canActOnTicket(t, state.user) && t.status === "open");
}

  await loadTicketEvents(id);
  setView("ticket", id);
}

function renderView(){
  switch(state.view){
    case "report": return renderReportForm();
    case "my-reports": return renderMyReports();
    case "health": return renderHealthForm();
    case "queue": return renderQueue();
    case "all-tickets": return renderAllTickets();
    case "vendor-tickets": return state.user.role==="vendor" ? renderVendorTickets() : renderReportForm();
    case "ticket": return renderTicketDetail();
    case "leaders": return renderLeaders();
    case "emergency-lookup": return renderEmergencyLookup();

    case "feedback": return renderFeedback();

  </div>`;
}

function slaBadge(t){
  if(t.status === "resolved") return "";
  const slaMs = (SLA_HOURS[t.urgency]||24) * 3600 * 1000;
  const start = new Date(t.sla_clock_start).getTime();
  const diff = (start + slaMs) - Date.now();
  if(diff <= 0) return `<span class="pill pill-high sla-pulse">⏰ Overdue — escalating</span>`;
  const hrs = Math.floor(diff/3600000);
  const mins = Math.floor((diff%3600000)/60000);
  const label = hrs>0 ? `${hrs}h ${mins}m left` : `${mins}m left`;
  let cls = "pill-resolved";
  if(diff < slaMs*0.25) cls = "pill-high";
  else if(diff < slaMs*0.5) cls = "pill-medium";
  return `<span class="pill ${cls}">${label}</span>`;
}

function ladder(t){
  const n = t.chain.length;
  const centerPct = i => ((i + 0.5) / n) * 100;
  const stageIdx0 = t.stage_index - 1; // 0-indexed current position
  const doneUpTo = t.status==='resolved' ? stageIdx0 : stageIdx0 - 1;
  const bgLeft = centerPct(0), bgRight = centerPct(n-1);
  const fgWidth = doneUpTo >= 0 ? centerPct(Math.min(doneUpTo, n-1)) - bgLeft : 0;
  const dots = t.chain.map((stage,i)=>{
    let cls = "";
    if(t.status==='resolved' && i<=stageIdx0) cls = "resolved";
    else if(i < stageIdx0) cls = "done";
    else if(i === stageIdx0) cls = "current";
    return `<div class="rung ${cls}">
      <div class="dot">${i+1}</div>
      <div class="label">${STAGE_LABELS[stage]}</div>
    </div>`;
  }).join("");
  return `<div class="ladder">
    <div class="track-bg" style="left:${bgLeft}%;width:${bgRight-bgLeft}%;"></div>
    <div class="track-fg" style="left:${bgLeft}%;width:${fgWidth}%;"></div>
    ${dots}
  </div>`;
}

function timelineItem(e){
  const actionLabel = {
    reported:"Reported the issue", escalated:"Escalated to "+STAGE_LABELS[e.stage],
    resolved:"Marked as resolved", reopened:"Reopened the report", comment:"Commented",
    auto_escalated:"⏰ Auto-escalated to "+STAGE_LABELS[e.stage]+" (SLA breach)",
    sla_exhausted:"⏰ Still overdue with the SRC",
    vendor_forwarded:"🔧 Forwarded to an external vendor"
  }[e.action] || e.action;
  return `
  <div class="timeline-item">
    <div class="t-dot"></div>
    <div class="t-body">
      <div class="t-head">${escapeHtml(e.by_name)} · ${actionLabel}</div>
      ${e.note ? `<div class="t-note">${escapeHtml(e.note)}</div>` : ``}
      <div class="t-time">${fmtTime(e.created_at)}</div>
    </div>
  </div>`;
}

/* ---- analytics: admin (everything) + residence manager (own residence) ---- */
function renderAnalytics(){
  const u = state.user;
  const scopeLabel = u.is_admin ? "Across all residences and campus" : `For ${escapeHtml(u.residence || "your residence")} only`;
  let tickets = state.tickets;
  if(!u.is_admin && u.role === "residence_manager"){
    tickets = tickets.filter(t => t.type==='residence' && t.residence && u.residence &&
      t.residence.trim().toLowerCase() === u.residence.trim().toLowerCase());
  }

  const total = tickets.length;
  const open = tickets.filter(t=>t.status==='open').length;
  const resolved = tickets.filter(t=>t.status==='resolved').length;
  const resolvedWithTime = tickets.filter(t=>t.status==='resolved' && t.resolved_at);
  const avgHours = resolvedWithTime.length > 0
    ? resolvedWithTime.reduce((sum,t)=> sum + (new Date(t.resolved_at) - new Date(t.created_at)), 0) / resolvedWithTime.length / 3600000
    : null;
  const breaches = tickets.filter(t => state.slaBreachTicketIds.has(t.id)).length;
  const healthEm = tickets.filter(t=>t.urgency==='health_emergency');
  const healthEmMetSLA = healthEm.filter(t=> t.resolved_at && (new Date(t.resolved_at) - new Date(t.created_at)) <= 30*60000).length;

  const byCategory = {};
  tickets.forEach(t=>{ byCategory[t.category] = (byCategory[t.category]||0) + 1; });
  const byUrgency = {};
  tickets.forEach(t=>{ const lbl = URGENCY_LABELS[t.urgency]||t.urgency; byUrgency[lbl] = (byUrgency[lbl]||0) + 1; });

  let byResidenceHtml = "";
  if(u.is_admin){
    const byResidence = {};
    tickets.forEach(t=>{
      const key = t.type==='campus' ? 'Campus' : (t.residence || 'Unspecified residence');
      byResidence[key] = (byResidence[key]||0) + 1;
    });
    byResidenceHtml = `
    <div class="card" style="margin-bottom:20px;">
      <h3 style="margin-top:0;font-size:15px;">By residence / campus</h3>
      ${total===0 ? `<div class="hint">No data yet.</div>` : barRows(byResidence, total)}
    </div>`;
  }

  const days = [];
  for(let i=13;i>=0;i--){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i); days.push(d); }
  const dayCounts = days.map(d=>{
    const next = new Date(d); next.setDate(next.getDate()+1);
    return tickets.filter(t=>{ const c=new Date(t.created_at); return c>=d && c<next; }).length;
  });
  const maxDay = Math.max(1, ...dayCounts);
  const trendHtml = `
    <div style="display:flex;align-items:flex-end;gap:4px;height:80px;">
      ${dayCounts.map((c,i)=>`
        <div style="flex:1;display:flex;align-items:flex-end;height:100%;" title="${days[i].toLocaleDateString('en-ZA',{day:'2-digit',month:'short'})}: ${c}">
          <div style="width:100%;background:var(--teal);border-radius:3px 3px 0 0;height:${c>0 ? Math.max((c/maxDay)*100,6) : 0}%;"></div>
        </div>`).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#a5ada7;margin-top:6px;">
      <span>${days[0].toLocaleDateString('en-ZA',{day:'2-digit',month:'short'})}</span>
      <span>${days[days.length-1].toLocaleDateString('en-ZA',{day:'2-digit',month:'short'})}</span>
    </div>`;

  return `
  <div class="topbar">
    <div><h1>Analytics</h1><p>${scopeLabel}.</p></div>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="n">${total}</div><div class="l">Total reports</div></div>
    <div class="stat"><div class="n">${open}</div><div class="l">Currently open</div></div>
    <div class="stat"><div class="n">${resolved}</div><div class="l">Resolved</div></div>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="n">${avgHours!==null ? (avgHours<1 ? Math.round(avgHours*60)+'m' : avgHours.toFixed(1)+'h') : '—'}</div><div class="l">Avg. time to resolve</div></div>
    <div class="stat"><div class="n">${breaches}</div><div class="l">SLA breaches (auto-escalated)</div></div>
    <div class="stat"><div class="n">${healthEm.length>0 ? healthEmMetSLA+'/'+healthEm.length : '—'}</div><div class="l">Health emergencies met 30-min SLA</div></div>
  </div>

  <div class="card" style="margin-bottom:20px;">
    <h3 style="margin-top:0;font-size:15px;">Reports over the last 14 days</h3>
    ${total===0 ? `<div class="hint">No data yet.</div>` : trendHtml}
  </div>

  <div class="card" style="margin-bottom:20px;">
    <h3 style="margin-top:0;font-size:15px;">By category</h3>
    ${total===0 ? `<div class="hint">No data yet.</div>` : barRows(byCategory, total)}
  </div>

  <div class="card" style="margin-bottom:20px;">
    <h3 style="margin-top:0;font-size:15px;">By urgency</h3>
    ${total===0 ? `<div class="hint">No data yet.</div>` : barRows(byUrgency, total)}
  </div>

  ${byResidenceHtml}
  `;
}

function barRows(dataObj, total){
  const entries = Object.entries(dataObj).sort((a,b)=>b[1]-a[1]);
  return entries.map(([label,count])=>{
    const pct = total>0 ? Math.round((count/total)*100) : 0;
    return `<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span>${escapeHtml(label)}</span><span class="mono" style="color:#7c867f;">${count} (${pct}%)</span>
      </div>
      <div style="background:var(--sand);border-radius:6px;height:8px;overflow:hidden;">
        <div style="background:var(--teal);height:100%;width:${pct}%;"></div>
      </div>
    </div>`;
  }).join("");
}

/* ---------------- event binding ---------------- */
function bindShellEvents(){
  bindOtherToggles();
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = ()=>{
      const n = el.dataset.nav;
      if(n==="signout"){ handleSignout(); return; }
      if(n==="notifications"){ markNotificationsSeen(); }
      setView(n);
    };
  });
  document.querySelectorAll('[data-open-ticket]').forEach(el=>{
    el.onclick = ()=>{ if(el.dataset.openTicket) openTicket(el.dataset.openTicket); };
  });

  const emergencySearch = document.getElementById('emergencySearch');
  if(emergencySearch){
    emergencySearch.oninput = async ()=>{
      const q = emergencySearch.value.trim();
      const box = document.getElementById('emergencyMatches');
      const resultBox = document.getElementById('emergencyResult');
      if(resultBox) resultBox.innerHTML = "";
      if(!box) return;
      if(q.length < 2){ box.innerHTML = ""; return; }
      const { data: matches } = await sb.from('profiles').select('*').eq('role','student')
        .or(`name.ilike.%${q}%,email.ilike.%${q}%`).limit(8);
      box.innerHTML = (!matches || matches.length===0)
        ? `<div class="hint" style="margin-top:8px;">No students matched.</div>`
        : matches.map(u => `
          <div class="ticket-row" data-emergency-pick="${u.id}" data-name="${escapeHtml(u.name)}" data-email="${escapeHtml(u.email)}" data-room="${escapeHtml(u.room_number||'')}" data-residence="${escapeHtml(u.residence||'')}" style="margin-top:8px;padding:12px 14px;">
            <div class="t-main">
              <div class="t-title">${escapeHtml(u.name)}</div>
              <div class="t-sub">${escapeHtml(u.email)}${u.room_number?" · Room "+escapeHtml(u.room_number):""}${u.residence?" · "+escapeHtml(u.residence):""}</div>
            </div>
          </div>`).join("");
      document.querySelectorAll('[data-emergency-pick]').forEach(row=>{
        row.onclick = ()=> showEmergencyResult(row.dataset.emergencyPick, row.dataset.name, row.dataset.email, row.dataset.room, row.dataset.residence);
      });
    };
  }

  const adminSearchInput = document.getElementById('adminSearch');
  if(adminSearchInput){
    adminSearchInput.oninput = ()=> adminSearch(adminSearchInput.value.trim());
    document.querySelectorAll('[data-admin-pick]').forEach(row=>{
      row.onclick = ()=>{
        const picked = state.adminResults.find(u => u.id === row.dataset.adminPick);
        state.adminSelected = picked || null;
        render();
      };
    });
    const assignForm = document.getElementById('adminAssignForm');
    if(assignForm) assignForm.onsubmit = (e)=>{
      e.preventDefault();
      const f = e.target;
      const role = f.role.value;
      const residence = (role==='house_committee'||role==='residence_manager') ? resolveOtherField(f,'adminResidence') : "";
      const vendorResidence = role==='vendor' ? resolveOtherField(f,'adminVendorResidence') : "";
      const vendorCategory = role==='vendor' ? f.vendorCategory.value : "";
      const vendorCompany = role==='vendor' ? f.vendorCompany.value.trim() : "";
      adminAssignRole(state.adminSelected.id, role, residence, f.phone.value.trim(), vendorResidence, vendorCategory, vendorCompany);
    };
  }

  const addPartnerForm = document.getElementById('addPartnerForm');
  if(addPartnerForm) addPartnerForm.onsubmit = (e)=>{
    e.preventDefault();
    const f = e.target;
    addApprovedPartner(f.partnerEmail.value, f.partnerCompany.value);
    f.reset();
  };
  document.querySelectorAll('[data-remove-partner]').forEach(b=>{
    b.onclick = ()=> removeApprovedPartner(b.dataset.removePartner);
  });

  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.onclick = ()=>{
    setView(state.user.role==="student" ? "my-reports" : "queue");
  };

  // report form
  document.querySelectorAll('[data-type]').forEach(b=>{
    b.onclick = ()=>{ state.newIssueType = b.dataset.type; render(); };
  });
  document.querySelectorAll('[data-urgency]').forEach(b=>{
    b.onclick = ()=>{ state.newUrgency = b.dataset.urgency; render(); };
  });
  const reportForm = document.getElementById('reportForm');
  if(reportForm) reportForm.onsubmit = async (e)=>{
    e.preventDefault();
    const f = e.target;
    const type = state.newIssueType;
    let residence = "", location = "";
    if(type === "residence"){
      residence = resolveOtherField(f, 'residence');
      if(!residence){ showToast("Please choose your residence."); return; }
      location = f.location.value.trim();
    } else {
      const building = resolveOtherField(f, 'building');
      if(!building){ showToast("Please choose a building."); return; }
      const detail = f.locationDetail.value.trim();
      location = building + (detail ? " — " + detail : "");
    }
    await createTicket({
      type, residence, category: f.category.value, location,
      description: f.description.value.trim(), urgency: state.newUrgency
    });
    state.newIssueType = null;
    state.newUrgency = "medium";
  };

  // health form
  const healthForm = document.getElementById('healthForm');
  if(healthForm){
    healthForm.onsubmit = async (e)=>{
      e.preventDefault();
      const f = e.target;
      state.healthInfo.blood_type = f.bloodType.value;
      state.healthInfo.clinic_or_aid = f.clinicOrAid.value;
      state.healthInfo.allergies = f.allergies.value;
      state.healthInfo.conditions = f.conditions.value;
      state.healthInfo.medications = f.medications.value;
      state.healthInfo.notes = f.notes.value;
      await saveHealth();
      render();
    };
    const addBtn = document.getElementById('addContact');
    if(addBtn) addBtn.onclick = ()=>{
      if(state.contacts.length>=3) return;
      state.contacts.push({name:"",relationship:"",phone:""});
      render();
    };
    document.querySelectorAll('[data-remove-contact]').forEach(b=>{
      b.onclick = ()=>{
        const idx = parseInt(b.dataset.removeContact,10);
        if(state.contacts.length<=1) return;
        state.contacts.splice(idx,1);
        render();
      };
    });
    document.querySelectorAll('.contact-row').forEach(row=>{
      const idx = parseInt(row.dataset.idx,10);
      row.querySelectorAll('input').forEach(inp=>{
        inp.oninput = ()=>{ state.contacts[idx][inp.dataset.field] = inp.value; };
      });
    });
  }

  // ticket actions
  const t = state.currentTicketId ? state.tickets.find(x=>x.id===state.currentTicketId) : null;
  const noteEl = document.getElementById('actionNote');
  const resolveBtn = document.getElementById('resolveBtn');
  if(resolveBtn) resolveBtn.onclick = async ()=>{ await resolveTicket(t, noteEl.value.trim()); render(); };
  const escalateBtn = document.getElementById('escalateBtn');
  if(escalateBtn) escalateBtn.onclick = async ()=>{ await escalateTicket(t, noteEl.value.trim()); render(); };
  const commentBtn = document.getElementById('commentBtn');
  if(commentBtn) commentBtn.onclick = async ()=>{
    if(!noteEl.value.trim()){ showToast("Write a note first."); return; }
    await commentTicket(t, noteEl.value.trim(), true); render();
  };
  const reopenBtn = document.getElementById('reopenBtn');
  if(reopenBtn) reopenBtn.onclick = async ()=>{
    const n = document.getElementById('reopenNote');
    await reopenTicket(t, n.value.trim()); render();
  };
  const ownerCommentBtn = document.getElementById('ownerCommentBtn');
  if(ownerCommentBtn) ownerCommentBtn.onclick = async ()=>{
    const n = document.getElementById('ownerNote');
    if(!n.value.trim()){ showToast("Write a note first."); return; }
    await commentTicket(t, n.value.trim()); render();
  };
  const forwardVendorBtn = document.getElementById('forwardVendorBtn');
  if(forwardVendorBtn) forwardVendorBtn.onclick = async ()=>{ await forwardToVendor(t, findVendorFor(t)); render(); };
  const vendorCommentBtn = document.getElementById('vendorCommentBtn');
  if(vendorCommentBtn) vendorCommentBtn.onclick = async ()=>{
    const n = document.getElementById('vendorNote');
    if(!n.value.trim()){ showToast("Write a note first."); return; }
    await sb.from('ticket_events').insert({
      ticket_id: t.id, stage: t.chain[t.stage_index-1], action: "comment", note: n.value.trim(),
      by_name: state.user.vendor_company || state.user.name, by_role: "vendor"
    });
    await loadTicketEvents(t.id); render();
  };

  // edit profile
  const profileForm = document.getElementById('profileForm');
  if(profileForm) profileForm.onsubmit = async (e)=>{
    e.preventDefault();
    const f = e.target;
    const updates = { name: f.name.value.trim(), phone: f.phone.value.trim() };
    if(f.roomNumber) updates.room_number = f.roomNumber.value.trim();
    if(f.residence) updates.residence = resolveOtherField(f, 'residence');
    const { error } = await sb.from('profiles').update(updates).eq('id', state.user.id);
    if(error){ showToast("Could not save: " + error.message); return; }
    Object.assign(state.user, updates);
    showToast("Profile updated.");
    render();
  };

  // feedback
  const feedbackForm = document.getElementById('feedbackForm');
  if(feedbackForm) feedbackForm.onsubmit = async (e)=>{
    e.preventDefault();
    const f = e.target;
    await saveFeedback({ type: f.type.value, message: f.message.value.trim() });
    showToast("Thanks — feedback sent!");
    f.reset();
  };
}

/* ---------------- bootstrap ---------------- */
(async function bootstrap(){
  if(!CONFIGURED){ state.loading = false; render(); return; }
  try{
    const { data: { session } } = await sb.auth.getSession();
    state.loading = false;
    if(session){ await loadUserAndGo(); }
    else { render(); }
  }catch(e){
    console.error("bootstrap failed", e);
    state.loading = false;
    render();
  }
})();

/* ---------------- PWA: service worker + install prompt ---------------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW registration failed', e));
  });
}

(function setupInstallPrompt(){
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  if (isStandalone) return; // already installed — nothing to show
  if (localStorage.getItem('fixitsmu_install_dismissed') === '1') return;

  function makeBanner(text, onInstallClick){
    const bar = document.createElement('div');
    bar.style.cssText = "position:fixed;left:12px;right:12px;bottom:12px;z-index:9999;background:#0A403C;color:#EFE6D6;padding:12px 14px;border-radius:12px;display:flex;align-items:center;gap:10px;font-family:'Inter',sans-serif;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.25);";
    const span = document.createElement('span');
    span.style.flex = "1";
    span.textContent = text;
    bar.appendChild(span);
    if (onInstallClick){
      const btn = document.createElement('button');
      btn.textContent = "Install";
      btn.style.cssText = "background:#E15A3D;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;flex-shrink:0;";
      btn.onclick = onInstallClick;
      bar.appendChild(btn);
    }
    const close = document.createElement('button');
    close.textContent = "✕";
    close.setAttribute('aria-label', 'Dismiss');
    close.style.cssText = "background:none;border:none;color:#EFE6D6;font-size:16px;cursor:pointer;padding:4px 6px;flex-shrink:0;";
    close.onclick = () => { bar.remove(); localStorage.setItem('fixitsmu_install_dismissed', '1'); };
    bar.appendChild(close);
    document.body.appendChild(bar);
    return bar;
  }

  // Android/Chrome: real native install prompt.
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    const bar = makeBanner("Install Fixit SMU on your phone for quicker access.", async () => {
      bar.remove();
      e.prompt();
      await e.userChoice;
    });
  });

  // iOS Safari has no install-prompt API — only manual "Add to Home Screen" works.
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (isIOS) {
    setTimeout(() => {
      makeBanner('Install this app: tap the Share icon below, then "Add to Home Screen".');
    }, 2500);
  }
})();
</script>
